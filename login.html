<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
    background: #f4f4f4;
    font-family: Arial;
}

.login-box {
    width: 300px;
    margin: 100px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    background: #ff4b2b;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // Simple login check
    if (user === "admin" && pass === "1234") {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "admin.html";
    } else {
        alert("Invalid Login!");
    }
}
</script>

</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

</body>
</html>
